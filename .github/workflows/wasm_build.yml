name: WASM Build

on: [push, pull_request]

jobs:
  build:

    runs-on: ${{matrix.os-type}}

    permissions:
      contents: write

    strategy:
      matrix:
        os-type: [windows-2022]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Setup node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
    - name: Get Emscripten
      run: ./tools/setup_emscripten_win.bat
    - name: Build WASM
      run: ./tools/build_wasm_win.bat Release
    - name: Update Package
      run: npm install
    - name: Run Test
      run: npm run test
    - name: Publish CSP build to Release
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        ls -la build/wasm/Release/ || echo "build output dir missing"
        gh release delete csp-build --yes --cleanup-tag || echo "no existing release to delete"
        gh release create csp-build \
          build/wasm/Release/occt-import-js.js \
          build/wasm/Release/occt-import-js.wasm \
          --title "MV3 CSP build (DYNAMIC_EXECUTION=0)" \
          --notes "occt-import-js rebuilt with -sDYNAMIC_EXECUTION=0 for Chrome MV3 (no unsafe-eval). Auto-published by CI."
